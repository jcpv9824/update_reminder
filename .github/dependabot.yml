version: 2
updates:
  - package-ecosystem: npm
    directory: /api
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Bogota
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    groups:
      backend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "08:15"
      timezone: America/Bogota
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    groups:
      frontend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: America/Bogota
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
