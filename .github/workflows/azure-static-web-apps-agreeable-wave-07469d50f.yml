name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  quality_gate:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Security, tests and builds
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            frontend/package-lock.json
      - name: Install backend dependencies
        working-directory: api
        run: npm ci
      - name: Enforce SQL-only backend runtime
        working-directory: api
        run: npm run check:no-cosmos-runtime
      - name: Audit backend production dependencies
        working-directory: api
        run: npm run security:audit:prod
      - name: Audit all backend dependencies
        working-directory: api
        run: npm run security:audit
      - name: Test and build backend
        working-directory: api
        run: npm test && npm run build
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Audit frontend production dependencies
        working-directory: frontend
        run: npm run security:audit:prod
      - name: Audit all frontend dependencies
        working-directory: frontend
        run: npm run security:audit
      - name: Test and build frontend
        working-directory: frontend
        run: npm test && npm run build

  build_and_deploy_job:
    needs: quality_gate
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.11.1 @actions/http-client
      - name: Get Id Token
        uses: actions/github-script@v7
        id: idtoken
        with:
           script: |
               const coredemo = require('@actions/core')
               return await coredemo.getIDToken()
           result-encoding: string
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_API_BASE_URL: https://erpupdsch4645-api.azurewebsites.net/api
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_WAVE_07469D50F }}
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "./frontend" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "dist" # Built app content directory - optional
          app_build_command: "VITE_API_BASE_URL=https://erpupdsch4645-api.azurewebsites.net/api npm run build"
          github_id_token: ${{ steps.idtoken.outputs.result }}
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
